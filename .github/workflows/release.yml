name: release

on:
  workflow_run:
    workflows: ["ci"]
    tags: ["*"]
    types:
      - completed

jobs:

  # check:
  #   name: Check tag origin
  #   runs-on: ubuntu-latest
  #   if: ${{ github.ref_protected }}
  #   outputs:
  #     check: ${{ steps.check.outputs.check }}
  #   steps:
  #     - id: check
  #       name: Check tag origin
  #       env:
  #         GITHUB_CONTEXT: ${{ toJSON(github) }}
  #         WORKFLOW_TAG_SHA: ${{ github.event.workflow_run.head_commit.id }}
  #         WORKFLOW_TAG: ${{ github.event.workflow_run.head_branch }}
  #         WORKFLOW_REF_NAME: ${{ github.ref_name}}
  #       run: |
  #         tagRef=$(git describe --tags --abbrev=0)
  #         echo $tagRef
  #         echo "::set-output name=check::$tagRef"
  #       working-directory: $GITHUB_WORKSPACE

  debug:
    name: Debug
    runs-on: ubuntu-latest
    outputs:
      match: ${{ steps.checkTag.outputs.match }}
    steps:
      - id: debug
        name: Debug
        env:
          GITHUB_CONTEXT: ${{ toJSON(github) }}
        run: |
          echo ${{ github.event.workflow_run.head_branch }}
          echo ${{ github.event.workflow_run.head_sha }}
          echo ${{ github.sha }}
          echo $GITHUB_CONTEXT

      - name: Check Tag
        id: checkTag
        run: |
          if [[ ${{ github.event.workflow_run.head_branch }} =~ ^[0-9].[0-9]+ ]]; then
              echo ::set-output name=match::true
          fi

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [debug]
    if: |
     needs.debug.outputs.match == 'true' && 
     github.event.workflow_run.head_sha == github.sha
    environment: production
    steps:
      - run: curl $CMD
        env:
          CMD: ${{ secrets.TEST_SECRET }}
