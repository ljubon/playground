name: master

on:
  workflow_run:
    workflows: ["ci"]
    push:
      tags: '*'
    types:
      - completed

jobs:
  dump:
    name: Dump output
    runs-on: ubuntu-latest
    steps:
      - name: Dump GitHub context
        env:
          GITHUB_CONTEXT: ${{ toJSON(github) }}
        run: echo "$GITHUB_CONTEXT"

  release:
    name: Release
    needs: [dump]
    runs-on: ubuntu-latest #&& github.workflow_run.head_branch ^[0-9+][.0-9+]*
    if: ${{ github.base_ref == '' && github.ref_name == 'master' }}
    environment: production
    steps:
      - run: curl $CMD
        env:
          CMD: ${{ secrets.TEST_SECRET }}
