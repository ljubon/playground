name: master

on:
  workflow_run:
    workflows: ["ci"]
    branches: ["master"]
    types:
      - completed

jobs:

  check:
    name: Check tag origin
    runs-on: ubuntu-latest
    steps:
      - name: Check tag origin
        env:
          GITHUB_CONTEXT: ${{ toJSON(github) }}
          WORKFLOW_TAG: ${{ github.workflow_run.head_commit.id}}
          WORKFLOW_REF_NAME: ${{ github.ref_name}}
        run: if $(git merge-base --is-ancestor ${WORKFLOW_REF_NAME} "${WORKFLOW_TAG}"); then echo "Tag from ${WORKFLOW_REF_NAME}"; else echo 1; fi

  release:
    name: Release
    needs: [check]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: curl $CMD
        env:
          CMD: ${{ secrets.TEST_SECRET }}
