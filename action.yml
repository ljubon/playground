name: 'Repository Dispatch task'
description: 'Repository Dispatch task'
inputs:
  appId:
    description: 'Application ID of GitHub App. [String]'
    required: true
    default: ''
  appPem: 
    description: 'PEM key registered to GitHub App. [String]'
    required: true
    default: ''
  installId:
    description: 'Installation ID of GitHub App. [String]'
    required: true
    default: ''
  remote_repo:
    description: 'Repository name to trigger (e.g username/repo) [String]'
    required: true
    default: ''
  remote_ref:
    description: 'Branch name. (e.g master, main, feature/test-me) Default: master [String]'
    required: false
    default: "master"
  remote_workflow:
    description: 'Workflow file to trigger. (e.g gh-pages) [String]'
    required: true
    default: ''
  remote_repo_inputs_1:
    description: 'Input parameter for remote repo'
    required: false
    default: ''
  remote_repo_inputs_2:
    description: 'Input parameter for remote repo'
    required: false
    default: ''
runs:
  using: "composite"
  steps:
    - id: repo-dispatch
      env:
        APP_ID: ${{ inputs.appId }}
        APP_PEM: ${{ inputs.appPem }}
        INSTALLATION_ID: ${{ inputs.installId }}
        REPO: ${{ inputs.remote_repo }}
        REF: ${{ inputs.remote_ref }}
        WORKFLOW: ${{ inputs.remote_workflow }}
        PARAM_1: ${{ inputs.remote_repo_inputs_1 }}
        PARAM_2: ${{ inputs.remote_repo_inputs_2 }}
        VERSION: 0.15.16
      run: |
          curl -sLO https://github.com/smallstep/cli/releases/download/v${VERSION}/step-cli_${VERSION}_amd64.deb > /dev/null
          sudo dpkg -i step-cli_${VERSION}_amd64.deb > /dev/null
          rm step-cli_${VERSION}_amd64.deb > /dev/null

          echo "$APP_PEM" > key.pem 
          trap "rm -f key.pem" EXIT

          APP_TOKEN=$(step crypto jwt sign --key key.pem --issuer $APP_ID --expiration $(date --date '+5 min' +'%s') --subtle </dev/null)
          ACCESS_TOKEN=$(curl -s -X POST -H "Accept: application/vnd.github.v3+json" -H "Authorization:Bearer $APP_TOKEN" https://api.github.com/app/installations/$INSTALLATION_ID/access_tokens | jq -r '.token')

          GITHUB_TOKEN=$ACCESS_TOKEN gh workflow run ${WORKFLOW} --repo ${REPO} --ref ${REF} --field ${PARAM_1} --field ${PARAM_2}
          echo "Success"
      shell: bash