name: master

on:
  workflow_run:
    workflows: ["ci"]
    types:
      - completed

jobs:

  check:
    name: Check tag origin
    runs-on: ubuntu-latest
    if: ${{ github.ref_protected }}
    outputs:
      check: ${{ steps.check.outputs.check }}
    steps:
      - id: check
        name: Check tag origin
        env:
          GITHUB_CONTEXT: ${{ toJSON(github) }}
          WORKFLOW_TAG_SHA: ${{ github.workflow_run.head_commit.id }}
          WORKFLOW_TAG: ${{ github.workflow_run.head_branch }}
          WORKFLOW_REF_NAME: ${{ github.ref_name}}
        run: |
          tagRef=$(git describe --tags --abbrev=0)
          echo $tagRef
          echo "::set-output name=check::$tagRef"
          

  release:
    name: Release
    needs: [check]
    runs-on: ubuntu-latest
    if: ${{ github.workflow_run.head_branch == needs.check.outputs.check }}
    environment: production
    steps:
      - run: curl $CMD
        env:
          CMD: ${{ secrets.TEST_SECRET }}
